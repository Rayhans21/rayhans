# Cadangan jika Vercel Cron tidak terdaftar — ping Supabase tiap hari (UTC).
name: Motolog keepalive

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping keepalive endpoint
        run: curl -fsS "https://rayhans.vercel.app/motolog/api/keepalive"
